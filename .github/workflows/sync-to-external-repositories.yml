name: sync to external repositories
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash --noprofile --norc -Eeuo pipefail {0}

permissions:
  contents: read

jobs:
  sync-to-external-repositories:
    strategy:
      fail-fast: false
      matrix:
        repository:
          - swift-dns/swift-tiny-sequence
          - swift-dns/swift-idna
          - swift-dns/swift-endpoint
          - swift-dns/swift-dns

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Generate swift-dns-helper token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SWIFT_DNS_HELPER_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_DNS_HELPER_PRIVATE_KEY }}
          owner: swift-dns

      - name: Check out ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          path: source
          persist-credentials: false

      - name: Check out ${{ matrix.repository }}
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repository }}
          path: ${{ matrix.repository }}
          persist-credentials: false

      - name: Mirror root-dir into ${{ matrix.repository }}
        run: rsync --archive --verbose source/root-dir/ ${{ matrix.repository }}/

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ matrix.repository }}
          branch: sync-files
          delete-branch: true
          sign-commits: true
          commit-message: "Sync files from ${{ github.repository }}"
          title: "Sync files from ${{ github.repository }}"
          body: "Automated sync from ${{ github.repository }}@${{ github.sha }}."
